<!doctype html>
<html>
  <head>
    <title>Arduino LED Control</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <h1>Control Arduino LED</h1>

    <div class="connection-button">
      <button class="disconnect hidden">Disconnect</button>
      <button id="connect">Connect</button>
    </div>

    <div class="controls">
      <button id="on">Turn ON</button>
      <button id="off">Turn OFF</button>
    </div>
  </body>
</html>
